# =============================================================================
# BOSSNYUMBA - Production Nginx reverse-proxy with TLS termination
# =============================================================================
# - Listens on :80 (ACME + redirect) and :443 (TLS terminated)
# - Reads certs from /etc/nginx/certs/ (bind-mounted from host)
# - Routes to api-gateway + the 4 app containers by Host header
# =============================================================================

worker_processes auto;
worker_rlimit_nofile 8192;

events {
  worker_connections 4096;
  multi_accept on;
  use epoll;
}

http {
  # -------------------------------------------------------------------------
  # Core defaults
  # -------------------------------------------------------------------------
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  65;
  server_tokens      off;
  client_max_body_size 25M;

  # -------------------------------------------------------------------------
  # Logging — structured JSON lines, consumed by fluent-bit / vector
  # -------------------------------------------------------------------------
  log_format json_combined escape=json
    '{'
      '"time":"$time_iso8601",'
      '"remote_addr":"$remote_addr",'
      '"request":"$request",'
      '"status":$status,'
      '"bytes_sent":$bytes_sent,'
      '"request_time":$request_time,'
      '"referer":"$http_referer",'
      '"user_agent":"$http_user_agent",'
      '"x_forwarded_for":"$http_x_forwarded_for",'
      '"host":"$host"'
    '}';

  access_log /var/log/nginx/access.log json_combined;
  error_log  /var/log/nginx/error.log warn;

  # -------------------------------------------------------------------------
  # Gzip
  # -------------------------------------------------------------------------
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types text/plain text/css application/json application/javascript
             text/xml application/xml application/xml+rss text/javascript;

  # -------------------------------------------------------------------------
  # Rate limiting — per-IP 20 req/s with burst 40. Tighter for /auth.
  # -------------------------------------------------------------------------
  limit_req_zone $binary_remote_addr zone=public:10m rate=20r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m   rate=5r/s;

  # -------------------------------------------------------------------------
  # TLS defaults — modern Mozilla profile
  # -------------------------------------------------------------------------
  ssl_protocols             TLSv1.2 TLSv1.3;
  ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers off;
  ssl_session_cache         shared:SSL:10m;
  ssl_session_timeout       1d;
  ssl_session_tickets       off;

  # Security headers shared by all virtual hosts
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Frame-Options           "SAMEORIGIN" always;
  add_header X-Content-Type-Options    "nosniff" always;
  add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

  # -------------------------------------------------------------------------
  # Upstreams (container DNS names inside the compose network)
  # -------------------------------------------------------------------------
  upstream api_gateway    { server api-gateway:4000; keepalive 32; }
  upstream customer_app   { server customer-app:3000;  keepalive 32; }
  upstream estate_manager { server estate-manager:3000; keepalive 32; }
  upstream owner_portal   { server owner-portal:80;    keepalive 32; }
  upstream admin_portal   { server admin-portal:80;    keepalive 32; }

  # -------------------------------------------------------------------------
  # HTTP → HTTPS redirect + ACME challenge
  # -------------------------------------------------------------------------
  server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
  }

  # -------------------------------------------------------------------------
  # bossnyumba.com  — marketing / customer app
  # -------------------------------------------------------------------------
  server {
    listen 443 ssl;
    http2 on;
    server_name bossnyumba.com www.bossnyumba.com;

    ssl_certificate     /etc/nginx/certs/bossnyumba.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/bossnyumba.com/privkey.pem;

    location / {
      limit_req zone=public burst=40 nodelay;
      proxy_pass         http://customer_app;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }

  # -------------------------------------------------------------------------
  # api.bossnyumba.com — api-gateway (REST + SSE)
  # -------------------------------------------------------------------------
  server {
    listen 443 ssl;
    http2 on;
    server_name api.bossnyumba.com;

    ssl_certificate     /etc/nginx/certs/bossnyumba.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/bossnyumba.com/privkey.pem;

    # SSE endpoints need these tweaks
    proxy_buffering   off;
    proxy_cache       off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    location /api/v1/auth {
      limit_req zone=auth burst=10 nodelay;
      proxy_pass         http://api_gateway;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
      limit_req zone=public burst=40 nodelay;
      proxy_pass         http://api_gateway;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
    }
  }

  # -------------------------------------------------------------------------
  # manage.bossnyumba.com — estate-manager app
  # -------------------------------------------------------------------------
  server {
    listen 443 ssl;
    http2 on;
    server_name manage.bossnyumba.com;

    ssl_certificate     /etc/nginx/certs/bossnyumba.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/bossnyumba.com/privkey.pem;

    location / {
      proxy_pass         http://estate_manager;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }

  # -------------------------------------------------------------------------
  # owners.bossnyumba.com — owner-portal
  # -------------------------------------------------------------------------
  server {
    listen 443 ssl;
    http2 on;
    server_name owners.bossnyumba.com;

    ssl_certificate     /etc/nginx/certs/bossnyumba.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/bossnyumba.com/privkey.pem;

    location / {
      proxy_pass         http://owner_portal;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }

  # -------------------------------------------------------------------------
  # admin.bossnyumba.com — admin-portal
  # -------------------------------------------------------------------------
  server {
    listen 443 ssl;
    http2 on;
    server_name admin.bossnyumba.com;

    ssl_certificate     /etc/nginx/certs/bossnyumba.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/bossnyumba.com/privkey.pem;

    location / {
      proxy_pass         http://admin_portal;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }
}
