# =============================================================================
# BOSSNYUMBA — nginx reverse proxy for docker-compose full stack
# =============================================================================
# Fronts the api-gateway at http://localhost:${NGINX_HTTP_PORT:-8080}.
# Separate from docker/nginx.conf (which serves the admin-portal SPA).
# =============================================================================

worker_processes 1;

events {
  worker_connections 1024;
}

http {
  access_log /dev/stdout;
  error_log  /dev/stderr warn;

  sendfile      on;
  tcp_nopush    on;
  keepalive_timeout 65;

  upstream bossnyumba_api {
    server api-gateway:4000;
  }

  server {
    listen 80;
    server_name _;

    # Liveness probe for compose/k8s.
    location = /_ping {
      access_log off;
      return 200 "pong\n";
      add_header Content-Type text/plain;
    }

    location / {
      proxy_pass         http://bossnyumba_api;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }
  }
}
