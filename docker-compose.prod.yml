# =============================================================================
# BOSSNYUMBA - Production docker-compose overlay
# =============================================================================
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This file:
#   - Pins real Postgres + Redis images (no ephemeral defaults)
#   - Replaces inline passwords with env-driven secrets (.env.production)
#   - Applies deploy.resources.limits to every service
#   - Adds an nginx TLS-terminating reverse proxy (bind-mounted certs)
#   - Adds a fluent-bit log-shipper stub (routes to Loki / CloudWatch / Elastic
#     depending on FLUENT_BIT_OUTPUT)
#
# Required env vars (.env.production):
#   POSTGRES_PASSWORD, REDIS_PASSWORD, NEO4J_PASSWORD,
#   JWT_SECRET, ANTHROPIC_API_KEY, OPENAI_API_KEY,
#   ELEVENLABS_API_KEY, SENTRY_DSN, POSTHOG_API_KEY,
#   TLS_CERT_DIR (host dir with fullchain.pem + privkey.pem)
# =============================================================================

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bossnyumba}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-bossnyumba}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    command: >
      postgres
      -c shared_buffers=512MB
      -c max_connections=200
      -c effective_cache_size=2GB
      -c work_mem=16MB
      -c maintenance_work_mem=128MB
      -c wal_level=replica
      -c log_min_duration_statement=500
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 1G

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  neo4j:
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?NEO4J_PASSWORD is required}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 1G
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 1G
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 1G

  api-gateway:
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-bossnyumba}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bossnyumba}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY is required}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: production
      POSTHOG_API_KEY: ${POSTHOG_API_KEY:-}
      POSTHOG_HOST: ${POSTHOG_HOST:-https://eu.posthog.com}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://bossnyumba.com,https://admin.bossnyumba.com,https://owners.bossnyumba.com,https://manage.bossnyumba.com}
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  payments-ledger:
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-bossnyumba}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bossnyumba}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      SENTRY_DSN: ${SENTRY_DSN:-}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  scheduler:
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-bossnyumba}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bossnyumba}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      SENTRY_DSN: ${SENTRY_DSN:-}
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  estate-manager:
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.bossnyumba.com/api/v1}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 1G }
        reservations: { cpus: "0.25", memory: 256M }

  customer-app:
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.bossnyumba.com/api/v1}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 1G }
        reservations: { cpus: "0.25", memory: 256M }

  owner-portal:
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256M }

  admin-portal:
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256M }

  # -------------------------------------------------------------------------
  # Nginx reverse-proxy with TLS termination
  # -------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: bossnyumba-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ${TLS_CERT_DIR:-./certs}:/etc/nginx/certs:ro
      - nginx_acme:/var/www/certbot
      - nginx_logs:/var/log/nginx
    depends_on:
      api-gateway:
        condition: service_healthy
      customer-app:
        condition: service_healthy
      estate-manager:
        condition: service_healthy
      owner-portal:
        condition: service_healthy
      admin-portal:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256M }

  # -------------------------------------------------------------------------
  # Fluent-bit log shipper (stub — target backend via FLUENT_BIT_OUTPUT)
  # Routes structured JSON logs from every container to CloudWatch/Loki/Elastic
  # -------------------------------------------------------------------------
  fluent-bit:
    image: fluent/fluent-bit:3.1
    container_name: bossnyumba-fluent-bit
    restart: unless-stopped
    volumes:
      - ./monitoring/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./monitoring/fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log:ro
      - nginx_logs:/nginx-logs:ro
    environment:
      FLUENT_BIT_OUTPUT: ${FLUENT_BIT_OUTPUT:-stdout}
      LOKI_URL: ${LOKI_URL:-}
      CLOUDWATCH_REGION: ${CLOUDWATCH_REGION:-}
      CLOUDWATCH_LOG_GROUP: ${CLOUDWATCH_LOG_GROUP:-/bossnyumba/prod}
      ELASTIC_HOST: ${ELASTIC_HOST:-}
    deploy:
      resources:
        limits: { cpus: "0.25", memory: 256M }

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  nginx_acme:
  nginx_logs:
