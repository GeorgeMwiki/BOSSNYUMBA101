  </g>
  <g filter="url(#softer)" opacity="0.85">
    <circle cx="200" cy="200" r="60" fill="url(#innerGlow)"/>
  </g>

  <rect x="65" y="65" width="270" height="270" rx="44" fill="none" stroke="url(#frame)" stroke-width="16" stroke-linejoin="round"/>
  <path d="M109 65h182a44 44 0 0 1 44 44" fill="none" stroke="url(#highlight)" stroke-width="16" stroke-linecap="round" opacity="0.7"/>

