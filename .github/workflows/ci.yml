# =============================================================================
# BOSSNYUMBA CI Pipeline
# =============================================================================
# Runs on: PRs to main/develop, pushes to main/develop
# Quality gates: lint, typecheck, test, build, e2e smoke, docker build, security
# Strict: Jobs fail the workflow if the underlying check fails. Known-flaky
# steps are gated behind explicit opt-in env flags rather than blanket
# continue-on-error so regressions do not slip through unnoticed.
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8.15.0'

jobs:
  # ============================================
  # Quality Gate 1: Lint (ESLint + Prettier)
  # ============================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

  # ============================================
  # Quality Gate 2: Type Check
  # ============================================
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript type check
        run: pnpm typecheck

  # ============================================
  # Quality Gate 3: Unit Tests (parallel matrix)
  # ============================================
  test:
    name: Unit Tests (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - packages
          - services
          - apps
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests (${{ matrix.workspace }})
        run: pnpm -r --filter="./${{ matrix.workspace }}/*" --if-present test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.workspace }}
          path: ${{ matrix.workspace }}/*/coverage
          retention-days: 7
          if-no-files-found: ignore

  # ============================================
  # Quality Gate 4: Build All Packages
  # ============================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            packages/*/dist
            apps/*/dist
            apps/*/.next
            services/*/dist
          retention-days: 7
          if-no-files-found: ignore

  # ============================================
  # Quality Gate 5: E2E Smoke (Playwright)
  # ============================================
  # E2E smoke is gated on the customer-app starting locally. When the
  # CI runner cannot stand the app up (no demo DB seed available), the
  # job will fail loudly, surfacing the regression early.
  # ============================================
  e2e:
    name: E2E Smoke
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Start services
        run: |
          pnpm --filter @bossnyumba/customer-app start &
          echo $! > /tmp/customer-app.pid
          npx -y wait-on http://localhost:3002 -t 90000

      - name: Run E2E smoke tests
        run: pnpm test:e2e -- --project=customer-app --grep="@smoke"
        env:
          CUSTOMER_APP_URL: http://localhost:3002

      - name: Stop services
        if: always()
        run: |
          if [ -f /tmp/customer-app.pid ]; then
            kill "$(cat /tmp/customer-app.pid)" 2>/dev/null || true
          fi

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            e2e-report/
          retention-days: 7
          if-no-files-found: ignore

  # ============================================
  # Docker Build Check (validate Dockerfiles)
  # ============================================
  docker-build:
    name: Docker Build (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: docker/Dockerfile.api
            context: .
            image: api-gateway
            build-args: ''
          - dockerfile: docker/Dockerfile.web
            context: .
            image: customer-app
            build-args: |
              APP_NAME=customer-app
              APP_PATH=apps/customer-app
          - dockerfile: docker/Dockerfile.web
            context: .
            image: owner-portal
            build-args: |
              APP_NAME=owner-portal
              APP_PATH=apps/owner-portal
          - dockerfile: docker/Dockerfile.service
            context: .
            image: payments
            build-args: |
              SERVICE_NAME=payments
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: false
          tags: bossnyumba/${{ matrix.image }}:ci-${{ github.sha }}
          build-args: ${{ matrix.build-args }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

  # ============================================
  # Terraform Plan (validation)
  # ============================================
  terraform-plan:
    name: Terraform Plan (${{ matrix.env }})
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        env: [staging, production]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform Format Check
        working-directory: infrastructure/terraform
        run: terraform fmt -check -recursive

      - name: Terraform Init (no backend)
        working-directory: infrastructure/terraform/environments/${{ matrix.env }}
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: infrastructure/terraform/environments/${{ matrix.env }}
        run: terraform validate

  # ============================================
  # Security Scan (Trivy filesystem)
  # ============================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  # ============================================
  # Summary
  # ============================================
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, build, e2e, docker-build, security-scan]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          echo "Lint: ${{ needs.lint.result }}"
          echo "TypeCheck: ${{ needs.typecheck.result }}"
          echo "Tests: ${{ needs.test.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "E2E: ${{ needs.e2e.result }}"
          echo "Docker: ${{ needs.docker-build.result }}"
          echo "Security: ${{ needs.security-scan.result }}"
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.typecheck.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.docker-build.result }}" != "success" ]; then
            echo "One or more required CI jobs failed."
            exit 1
          fi
          echo "All required CI jobs passed."

      - name: Summary
        if: always()
        run: |
          {
            echo "## CI Summary"
            echo ""
            echo "| Job | Status |"
            echo "|-----|--------|"
            echo "| Lint | ${{ needs.lint.result }} |"
            echo "| Type Check | ${{ needs.typecheck.result }} |"
            echo "| Tests | ${{ needs.test.result }} |"
            echo "| Build | ${{ needs.build.result }} |"
            echo "| E2E | ${{ needs.e2e.result }} |"
            echo "| Docker | ${{ needs.docker-build.result }} |"
            echo "| Security | ${{ needs.security-scan.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"
