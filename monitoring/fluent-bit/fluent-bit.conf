# =============================================================================
# BOSSNYUMBA - Fluent-bit routing
# =============================================================================
# Reads docker container logs + nginx logs, parses JSON, routes to the
# aggregator selected by $FLUENT_BIT_OUTPUT (stdout|loki|cloudwatch|elastic).
# =============================================================================

[SERVICE]
    Flush        5
    Daemon       off
    Log_Level    info
    Parsers_File parsers.conf
    HTTP_Server  On
    HTTP_Listen  0.0.0.0
    HTTP_Port    2020

# ------- Inputs ----------------------------------------------------------------

[INPUT]
    Name              tail
    Tag               docker.*
    Path              /var/lib/docker/containers/*/*.log
    Parser            docker
    DB                /var/log/flb_docker.db
    Mem_Buf_Limit     50MB
    Skip_Long_Lines   On
    Refresh_Interval  5

[INPUT]
    Name              tail
    Tag               nginx.access
    Path              /nginx-logs/access.log
    Parser            json
    DB                /var/log/flb_nginx.db
    Mem_Buf_Limit     10MB

# ------- Filters ---------------------------------------------------------------

[FILTER]
    Name    modify
    Match   *
    Add     environment production
    Add     app         bossnyumba

[FILTER]
    Name    nest
    Match   docker.*
    Operation lift
    Nested_under log
    Add_prefix  app_

# ------- Outputs (one enabled by env var) --------------------------------------

[OUTPUT]
    Name   stdout
    Match  *
    Format json_lines

