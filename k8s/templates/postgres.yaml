{{- if .Values.postgres.enabled -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "bossnyumba.fullname" . }}-postgres
  labels:
    {{- include "bossnyumba.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  serviceName: {{ include "bossnyumba.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      {{- include "bossnyumba.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        {{- include "bossnyumba.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: bossnyumba
            - name: POSTGRES_DB
              value: bossnyumba
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bossnyumba-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "bossnyumba"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "bossnyumba"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  {{- if .Values.postgres.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.postgres.persistence.storageClass }}
        storageClassName: {{ .Values.postgres.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.persistence.size }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "bossnyumba.fullname" . }}-postgres
  labels:
    {{- include "bossnyumba.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - port: 5432
      name: postgres
  selector:
    {{- include "bossnyumba.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
{{- end -}}
