groups:
  - name: bossnyumba_sla
    interval: 1m
    rules:
      - alert: CaseSlaBreaches
        expr: sum(rate(case_sla_breached_total[1h])) > 2
        for: 30m
        labels:
          severity: warning
          team: ops
        annotations:
          summary: "Case SLA breach rate > 2/hour"

      - alert: FarChecksOverdue
        expr: sum(far_checks_overdue) > 50
        for: 1h
        labels:
          severity: warning
          team: ops
        annotations:
          summary: "More than 50 FAR checks overdue"

      - alert: RentCollectionLag
        expr: sum(rent_collection_overdue_tzs) > 10000000
        for: 6h
        labels:
          severity: warning
          team: finance
        annotations:
          summary: "Overdue rent exceeds 10M TZS"

      - alert: NotificationsDlqDepth
        expr: sum(notifications_dlq_depth) > 100
        for: 15m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Notifications DLQ depth > 100 messages"
