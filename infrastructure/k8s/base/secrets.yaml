# =============================================================================
# BOSSNYUMBA - Secrets (External Secrets Operator)
# =============================================================================
# This file does NOT contain secret material. It declares which secrets to
# pull from AWS Secrets Manager into the cluster via External Secrets Operator
# (ESO). We chose ESO over SOPS because secrets live outside git entirely
# (AWS Secrets Manager is the source of truth) and rotation does not require
# a git commit. AWS was chosen as the backend to match the Terraform stack.
#
# Prerequisites:
#   1. Install ESO in the cluster (once per cluster):
#        kubectl apply -k operators/external-secrets
#      (or `helm install external-secrets external-secrets/external-secrets
#      -n external-secrets --create-namespace`)
#
#   2. Create an IAM role that can `secretsmanager:GetSecretValue` on
#      `arn:aws:secretsmanager:<region>:<acct>:secret:/bossnyumba/<env>/*`
#      and bind it to the `bossnyumba-external-secrets` ServiceAccount via
#      IRSA (EKS) by setting the
#      `eks.amazonaws.com/role-arn` annotation on the ServiceAccount.
#
#   3. Populate AWS Secrets Manager with the referenced paths. Example:
#        aws secretsmanager create-secret \
#          --name /bossnyumba/staging/db \
#          --secret-string '{"DATABASE_URL":"postgres://...","PGPASSWORD":"..."}'
#
# Secret paths follow: /bossnyumba/{env}/{component}
#   env        = staging | production   (overlays patch .spec.dataFrom.key)
#   component  = db | redis | jwt | payments
#
# Each ExternalSecret below materializes a native Kubernetes Secret of the
# same name with the listed keys. Pods mount them via envFrom or secretKeyRef.
# =============================================================================
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bossnyumba-external-secrets
  namespace: bossnyumba
  labels:
    app.kubernetes.io/name: bossnyumba
    app.kubernetes.io/component: secrets
  annotations:
    # Overlays (staging/production) override this with the environment's
    # account-specific IAM role ARN via a kustomize patch.
    eks.amazonaws.com/role-arn: arn:aws:iam::000000000000:role/bossnyumba-external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: bossnyumba-aws-secrets
  namespace: bossnyumba
  labels:
    app.kubernetes.io/name: bossnyumba
    app.kubernetes.io/component: secrets
spec:
  provider:
    aws:
      service: SecretsManager
      # Overlays patch .spec.provider.aws.region if an env uses another region.
      region: eu-west-1
      auth:
        jwt:
          serviceAccountRef:
            name: bossnyumba-external-secrets
---
# -----------------------------------------------------------------------------
# Database credentials
# AWS secret: /bossnyumba/{env}/db  (JSON keys: DATABASE_URL, PGPASSWORD)
# -----------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: bossnyumba-db
  namespace: bossnyumba
  labels:
    app.kubernetes.io/name: bossnyumba
    app.kubernetes.io/component: database
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bossnyumba-aws-secrets
    kind: SecretStore
  target:
    name: bossnyumba-db
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: /bossnyumba/staging/db
        property: DATABASE_URL
    - secretKey: PGPASSWORD
      remoteRef:
        key: /bossnyumba/staging/db
        property: PGPASSWORD
---
# -----------------------------------------------------------------------------
# Redis credentials
# AWS secret: /bossnyumba/{env}/redis  (JSON keys: REDIS_URL, REDIS_PASSWORD)
# -----------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: bossnyumba-redis
  namespace: bossnyumba
  labels:
    app.kubernetes.io/name: bossnyumba
    app.kubernetes.io/component: cache
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bossnyumba-aws-secrets
    kind: SecretStore
  target:
    name: bossnyumba-redis
    creationPolicy: Owner
  data:
    - secretKey: REDIS_URL
      remoteRef:
        key: /bossnyumba/staging/redis
        property: REDIS_URL
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: /bossnyumba/staging/redis
        property: REDIS_PASSWORD
---
# -----------------------------------------------------------------------------
# JWT / internal auth
# AWS secret: /bossnyumba/{env}/jwt  (JSON keys: JWT_SECRET, INTERNAL_API_KEY)
# -----------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: bossnyumba-jwt
  namespace: bossnyumba
  labels:
    app.kubernetes.io/name: bossnyumba
    app.kubernetes.io/component: auth
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bossnyumba-aws-secrets
    kind: SecretStore
  target:
    name: bossnyumba-jwt
    creationPolicy: Owner
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: /bossnyumba/staging/jwt
        property: JWT_SECRET
    - secretKey: INTERNAL_API_KEY
      remoteRef:
        key: /bossnyumba/staging/jwt
        property: INTERNAL_API_KEY
---
# -----------------------------------------------------------------------------
# Payments (Stripe + M-Pesa Daraja)
# AWS secret: /bossnyumba/{env}/payments  (JSON keys: STRIPE_SECRET_KEY,
#   STRIPE_WEBHOOK_SECRET, MPESA_CONSUMER_KEY, MPESA_CONSUMER_SECRET)
# -----------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: bossnyumba-payments
  namespace: bossnyumba
  labels:
    app.kubernetes.io/name: bossnyumba
    app.kubernetes.io/component: payments
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bossnyumba-aws-secrets
    kind: SecretStore
  target:
    name: bossnyumba-payments
    creationPolicy: Owner
  data:
    - secretKey: STRIPE_SECRET_KEY
      remoteRef:
        key: /bossnyumba/staging/payments
        property: STRIPE_SECRET_KEY
    - secretKey: STRIPE_WEBHOOK_SECRET
      remoteRef:
        key: /bossnyumba/staging/payments
        property: STRIPE_WEBHOOK_SECRET
    - secretKey: MPESA_CONSUMER_KEY
      remoteRef:
        key: /bossnyumba/staging/payments
        property: MPESA_CONSUMER_KEY
    - secretKey: MPESA_CONSUMER_SECRET
      remoteRef:
        key: /bossnyumba/staging/payments
        property: MPESA_CONSUMER_SECRET
